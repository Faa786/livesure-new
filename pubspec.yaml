name: livesure_op
description: Complete ERP + Delivery Management System for 19L Water Plants
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  equatable: ^2.0.5

  # Backend & Services
  supabase_flutter: ^2.5.6

  # UI
  google_maps_flutter: ^2.9.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.0.0

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # QR Code
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # PDF & Reports
  pdf: ^3.11.1
  printing: ^5.13.1

  # Storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Other
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
