name: livesure_op
description: Complete ERP + Delivery Management System for 19L Water Plants
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider:
  equatable:

  # Backend & Services
  supabase_flutter:
  firebase_core:
  firebase_messaging:

  # UI
  google_maps_flutter:
  fl_chart:
  google_fonts:
  flutter_svg:
  cached_network_image:
  shimmer:

  # Forms
  flutter_form_builder:
  form_builder_validators:

  # Networking
  dio:
  connectivity_plus:

  # Location
  geolocator:
  geocoding:

  # QR Code
  qr_code_scanner:
  qr_flutter:

  # Utilities
  intl:
  url_launcher:
  share_plus:
  permission_handler:
  device_info_plus:
  package_info_plus:

  # Notifications
  flutter_local_notifications:
  timezone:

  # PDF & Reports
  pdf:
  printing:

  # Storage
  shared_preferences:
  hive_flutter:
  path_provider:

  # Other
  flutter_dotenv:
  image_picker:
  file_picker:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  build_runner:
  hive_generator:

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
